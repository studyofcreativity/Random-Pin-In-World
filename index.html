<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Pin In World</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');

        body {
            background-color: #0c0c0c;
            color: #00ff88;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            height: 100vh;
        }

        #map-canvas {
            width: 95vw;
            max-width: 1200px;
            height: 60vh;
            border: 1px solid #333;
            border-radius: 4px;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            background: #000;
        }

        #map {
            width: 100%;
            height: 100%;
            cursor: crosshair;
            background: #000;
        }

        #coords-tooltip {
            position: fixed;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00ff88;
            padding: 6px 14px;
            font-size: 14px;
            color: #00ff88;
            z-index: 9999;
            display: none;
            border-radius: 2px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .btn-random {
            background: #00ff88;
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .btn-random:hover {
            transform: translateY(-2px);
            background: #05ff95;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.5);
        }

        .btn-random:active {
            transform: translateY(1px);
        }

        #toast {
            position: fixed;
            bottom: 30px;
            background: #ffffff;
            color: #000;
            padding: 10px 25px;
            border-radius: 4px;
            font-weight: bold;
            display: none;
            z-index: 10000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center">

    <div class="mb-8 text-center">
        <h1 class="text-4xl font-black tracking-widest uppercase">Random Pin <span class="text-white text-2xl block mt-1">In World</span></h1>
    </div>

    <div id="map-canvas">
        <div id="map"></div>
    </div>

    <div id="coords-tooltip">0.000000, 0.000000</div>

    <div class="mt-10 flex flex-col items-center gap-6">
        <button id="randomBtn" class="btn-random px-16 py-5 rounded-sm text-2xl">
            RANDOM
        </button>
        <p class="text-[11px] text-gray-500 tracking-[0.3em] uppercase">Click para copiar coordenadas decimales</p>
    </div>

    <div id="toast">COORDENADAS COPIADAS</div>

    <script>
        let map;
        let marker;
        let currentPos = { lat: 0, lng: 0 };
        const tooltip = document.getElementById('coords-tooltip');
        const toast = document.getElementById('toast');

        // Límites geográficos estrictos
        const southWest = L.latLng(-89.9, -179.9);
        const northEast = L.latLng(89.9, 179.9);
        const bounds = L.latLngBounds(southWest, northEast);

        function initMap() {
            // Configuración del mapa finito
            map = L.map('map', {
                zoomControl: false,
                attributionControl: false,
                maxBounds: bounds,
                maxBoundsViscosity: 1.0,
                worldCopyJump: false
            }).setView([20, 0], 2);

            // Capa satelital de alta resolución
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 18,
                noWrap: true
            }).addTo(map);

            // Inicializar pin
            marker = L.marker([20, 0]).addTo(map);
        }

        function jumpToRandom() {
            // Generar latitud y longitud aleatoria
            const lat = (Math.random() * 160 - 80).toFixed(6);
            const lng = (Math.random() * 340 - 170).toFixed(6);
            
            currentPos = { lat, lng };

            marker.setLatLng([lat, lng]);
            map.flyTo([lat, lng], 7, {
                duration: 1.8,
                easeLinearity: 0.25
            });

            tooltip.innerText = `${lat}, ${lng}`;
        }

        // Evento de movimiento de mouse
        document.getElementById('map-canvas').addEventListener('mousemove', (e) => {
            tooltip.style.display = 'block';
            tooltip.style.left = (e.clientX + 20) + 'px';
            tooltip.style.top = (e.clientY + 20) + 'px';
            tooltip.innerText = `${currentPos.lat}, ${currentPos.lng}`;
        });

        document.getElementById('map-canvas').addEventListener('mouseleave', () => {
            tooltip.style.display = 'none';
        });

        // Evento de copiado
        document.getElementById('map-canvas').addEventListener('click', () => {
            const textToCopy = `${currentPos.lat}, ${currentPos.lng}`;
            
            const el = document.createElement('textarea');
            el.value = textToCopy;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            // Notificación visual
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        });

        document.getElementById('randomBtn').addEventListener('click', jumpToRandom);

        // Carga inicial
        window.onload = () => {
            initMap();
            jumpToRandom();
        };
    </script>
</body>
</html>
